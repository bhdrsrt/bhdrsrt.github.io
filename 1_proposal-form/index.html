<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposal Form</title>
    <link rel="stylesheet" href="../resources/style.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <!-- <img class="logo" src="../resources/logo.svg" alt="Company logo" role="img" draggable="false"> -->
        <h1 class="title">Proposal Form</h1>
        <time class="time" datetime="2024-10-24">24/10/24</time>
    </header>
    <form class="proposal-form" action="" method="post">
        <section class="customer-info">
            <details class="accordion" name="form-detail" open>
                <summary>Customer Information</summary>
                <input class="inp-one" type="text" name="customer-title" id="customer-title" placeholder="Name/Title" required>
                <input class="inp-one" type="tel" name="customer-tel" id="customer-tel" placeholder="Phone" required>
                <input class="inp-one" type="email" name="customer-email" id="customer-email" placeholder="Email">
                <input class="inp-one" type="text" name="customer-address" id="customer-address" placeholder="Address">
            </details>
        </section>
        <hr class="divider">
        <section class="prod-info">
            <details class="accordion" name="form-detail">
                <summary>Add Product ...</summary>
                <input class="inp-one" type="text" name="prod-code" id="prod-code" placeholder="Product Code">
                <input class="inp-one" type="text" name="prod-descr" id="prod-descr" placeholder="Description">
                <input class="inp-one" type="number" name="prod-qty" id="prod-qty" placeholder="Quantity">
                <input class="inp-one" type="text" name="prod-unit" id="prod-unit" placeholder="Unit">
                <input class="inp-one" type="number" name="prod-gross-price" id="prod-gross-price" placeholder="Gross Price">
                <input class="inp-one" type="number" name="prod-disc-rate" id="prod-disc-rate" placeholder="Discount Rate">
                <input class="inp-one" type="number" name="prod-reduced-price" id="prod-reduced-price" placeholder="Reduced Price">
                <input class="inp-one" type="number" name="prod-net-price" id="prod-net-price" placeholder="Net Price">
            </details>
            <details class="accordion" name="form-detail">
                <summary>Add Product ...</summary>
                <input class="inp-one" type="text" name="prod-code" id="prod-code" placeholder="Product Code">
                <input class="inp-one" type="text" name="prod-descr" id="prod-descr" placeholder="Description">
                <input class="inp-one" type="number" name="prod-qty" id="prod-qty" placeholder="Quantity">
                <input class="inp-one" type="text" name="prod-unit" id="prod-unit" placeholder="Unit">
                <input class="inp-one" type="number" name="prod-gross-price" id="prod-gross-price" placeholder="Gross Price">
                <input class="inp-one" type="number" name="prod-disc-rate" id="prod-disc-rate" placeholder="Discount Rate">
                <input class="inp-one" type="number" name="prod-reduced-price" id="prod-reduced-price" placeholder="Reduced Price">
                <input class="inp-one" type="number" name="prod-net-price" id="prod-net-price" placeholder="Net Price">
            </details>
            <details class="accordion" name="form-detail">
                <summary>Add Product ...</summary>
                <input class="inp-one" type="text" name="prod-code" id="prod-code" placeholder="Product Code">
                <input class="inp-one" type="text" name="prod-descr" id="prod-descr" placeholder="Description">
                <input class="inp-one" type="number" name="prod-qty" id="prod-qty" placeholder="Quantity">
                <input class="inp-one" type="text" name="prod-unit" id="prod-unit" placeholder="Unit">
                <input class="inp-one" type="number" name="prod-gross-price" id="prod-gross-price" placeholder="Gross Price">
                <input class="inp-one" type="number" name="prod-disc-rate" id="prod-disc-rate" placeholder="Discount Rate">
                <input class="inp-one" type="number" name="prod-reduced-price" id="prod-reduced-price" placeholder="Reduced Price">
                <input class="inp-one" type="number" name="prod-net-price" id="prod-net-price" placeholder="Net Price">
            </details>
        </section>
        <button id="add-product" class="btn-one icon">+</button>
    </form>
    <script src="./proposal-form.js"></script>
</body>
</html>
