<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposal Form</title>
    <link rel="stylesheet" href="../resources/style.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <!-- <img class="logo" src="../resources/logo.svg" alt="Company logo" role="img" draggable="false"> -->
        <h1 class="title">Proposal Form</h1>
        <!-- <time class="time" datetime="2024-10-24">24/10/24</time> -->
    </header>
    <form class="proposal-form" action="" method="post">
        <section class="customer-info">
            <details class="accordion" name="form-detail">
                <summary>Customer Information</summary>
                <input class="inp-one" type="text" name="customer-title" id="customer-title" placeholder="Name/Title" required>
                <input class="inp-one" type="tel" name="customer-tel" id="customer-tel" placeholder="Phone" required>
                <input class="inp-one" type="email" name="customer-email" id="customer-email" placeholder="Email">
                <input class="inp-one" type="text" name="customer-address" id="customer-address" placeholder="Address">
            </details>
        </section>
        <hr class="divider">
        <section class="prod-info"></section>
        <section class="form-btns">
            <button class="btn-one btn-one-green" type="button">Save</button>
            <button id="add-product" class="btn-one btn-one-black" type="button">Add Product</button>
            <button class="btn-one btn-one-red" type="button" onclick="window.location.href='../0_homepage-sales/index.html';">Exit</button>
        </section>
    </form>
    <script src="./proposal-form.js"></script>
</body>
</html>
