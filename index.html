<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../resources/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img class="logo" src="./resources/logo.svg" alt="Company logo" role="img" draggable="false">
    <hr class="divider larger">
    <form id="login-form" action="" method="post">
        <input class="inp-one" type="text" name="username" id="name" placeholder="Username" minlength="7" maxlength="15" pattern="[A-Za-z]{7,15}" required autofocus>
        <input class="inp-one" type="password" name="password" id="password" placeholder="Password" minlength="7" maxlength="15" pattern="[0-9]{7,15}" required>
        <input type="submit" value="Login" style="display: none;">
    </form>
    <script src="main.js"></script>
</body>
</html>
